<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>求职管家 · 登录</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;}
  html,body{height:100%;margin:0;}
  body{
    font-family:'Noto Sans SC',system-ui,sans-serif;color:#18223a;
    background:#f5f7fb;display:flex;align-items:center;justify-content:center;padding:24px;
  }
  .card{
    width:100%;max-width:380px;background:#fff;border:1px solid #ebeef4;border-radius:18px;
    padding:30px 30px 26px;box-shadow:0 10px 40px rgba(31,53,90,.06);
  }
  .brand{display:flex;align-items:center;gap:10px;margin-bottom:22px;}
  .brand .logo{
    width:36px;height:36px;border-radius:10px;background:#2f6fed;display:flex;
    align-items:center;justify-content:center;flex-shrink:0;
  }
  .brand .t1{font-size:15px;font-weight:700;line-height:1.1;}
  .brand .t2{font-size:11px;color:#93a0b8;margin-top:2px;}
  .tabs{display:flex;gap:6px;background:#f1f4f9;border-radius:11px;padding:4px;margin-bottom:20px;}
  .tabs button{
    flex:1;border:none;background:transparent;font-family:inherit;font-size:13.5px;font-weight:600;
    color:#7e8aa3;padding:8px 0;border-radius:8px;cursor:pointer;transition:all .15s;
  }
  .tabs button.on{background:#fff;color:#2f6fed;box-shadow:0 1px 3px rgba(31,53,90,.08);}
  label{display:block;font-size:12.5px;font-weight:600;color:#56617a;margin:14px 0 6px;}
  input{
    width:100%;height:42px;border:1px solid #dde3ee;border-radius:10px;padding:0 13px;
    font-family:inherit;font-size:14px;color:#18223a;outline:none;transition:border-color .15s,box-shadow .15s;
  }
  input:focus{border-color:#2f6fed;box-shadow:0 0 0 3px rgba(47,111,237,.12);}
  .submit{
    width:100%;height:44px;margin-top:22px;border:none;border-radius:10px;background:#2f6fed;color:#fff;
    font-family:inherit;font-size:14.5px;font-weight:600;cursor:pointer;transition:background .15s,opacity .15s;
  }
  .submit:hover{background:#2860d8;}
  .submit:disabled{opacity:.6;cursor:not-allowed;}
  .msg{margin-top:14px;font-size:12.5px;line-height:1.6;display:none;border-radius:9px;padding:9px 12px;}
  .msg.err{display:block;background:#fdecec;color:#c0392b;border:1px solid #f7d2d2;}
  .msg.ok{display:block;background:#e7f6ef;color:#1f8f5f;border:1px solid #c7ecd9;}
  .hint{margin-top:16px;font-size:11.5px;color:#9aa6bd;text-align:center;line-height:1.6;}
</style>
</head>
<body>
  <form class="card" id="form" autocomplete="off">
    <div class="brand">
      <div class="logo">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12l4 4 10-10"></path></svg>
      </div>
      <div>
        <div class="t1">求职管家</div>
        <div class="t2">个人求职工作台</div>
      </div>
    </div>

    <div class="tabs">
      <button type="button" id="tab-login" class="on">登录</button>
      <button type="button" id="tab-register">注册</button>
    </div>

    <label for="username">用户名</label>
    <input id="username" name="username" type="text" autocomplete="off" placeholder="字母 / 数字，2–32 位" required>

    <div id="row-display" style="display:none;">
      <label for="displayName">昵称（可选）</label>
      <input id="displayName" name="displayName" type="text" autocomplete="off" placeholder="显示在侧边栏的名字">
    </div>

    <label for="password">密码</label>
    <input id="password" name="password" type="password" autocomplete="off" placeholder="至少 6 位" required>

    <div id="row-confirm" style="display:none;">
      <label for="confirm">确认密码</label>
      <input id="confirm" name="confirm" type="password" autocomplete="off" placeholder="再次输入密码">
    </div>

    <button type="submit" class="submit" id="submit">登录</button>
    <div class="msg" id="msg"></div>
    <div class="hint">数据保存在你本机浏览器，按账号隔离。</div>
  </form>

<script>
(function () {
  var mode = 'login';
  var el = function (id) { return document.getElementById(id); };
  var msg = el('msg');
  function setMode(m) {
    mode = m;
    el('tab-login').classList.toggle('on', m === 'login');
    el('tab-register').classList.toggle('on', m === 'register');
    el('row-display').style.display = m === 'register' ? '' : 'none';
    el('row-confirm').style.display = m === 'register' ? '' : 'none';
    el('submit').textContent = m === 'register' ? '注册并登录' : '登录';
    el('password').setAttribute('autocomplete', 'off');
    msg.className = 'msg';
    msg.textContent = '';
  }
  function show(kind, text) { msg.className = 'msg ' + kind; msg.textContent = text; }
  function clearMessage() {
    msg.className = 'msg';
    msg.textContent = '';
  }
  function resetEntryState() {
    ['username', 'password', 'displayName', 'confirm'].forEach(function (id) {
      el(id).value = '';
    });
    el('submit').disabled = false;
    setMode('login');
    clearMessage();
  }
  el('tab-login').onclick = function () { setMode('login'); };
  el('tab-register').onclick = function () { setMode('register'); };
  ['username', 'password', 'displayName', 'confirm'].forEach(function (id) {
    el(id).addEventListener('input', clearMessage);
  });

  el('form').addEventListener('submit', function (e) {
    e.preventDefault();
    var username = el('username').value.trim();
    var password = el('password').value;
    if (!username || !password) { show('err', '请填写用户名和密码'); return; }
    if (mode === 'register') {
      if (password.length < 6) { show('err', '密码至少 6 位'); return; }
      if (password !== el('confirm').value) { show('err', '两次输入的密码不一致'); return; }
    }
    var path = mode === 'register' ? '/api/auth/register' : '/api/auth/login';
    var body = { username: username, password: password };
    if (mode === 'register') body.displayName = el('displayName').value.trim();
    el('submit').disabled = true;
    fetch(path, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'same-origin',
      body: JSON.stringify(body),
    })
      .then(function (r) { return r.json().then(function (d) { return { ok: r.ok, d: d }; }); })
      .then(function (res) {
        if (!res.ok) { show('err', (res.d && res.d.error) || '操作失败，请重试'); el('submit').disabled = false; return; }
        show('ok', mode === 'register' ? '注册成功，正在进入…' : '登录成功，正在进入…');
        window.location.href = '/';
      })
      .catch(function () { show('err', '网络错误，请稍后重试'); el('submit').disabled = false; });
  });

  resetEntryState();
  window.addEventListener('pageshow', resetEntryState);
  window.setTimeout(resetEntryState, 0);
})();
</script>
</body>
</html>
