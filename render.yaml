services:
  - type: web
    name: resume-assistant
    runtime: node
    rootDir: server
    buildCommand: npm ci
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: DEEPSEEK_MODEL
        value: deepseek-v4-flash
      - key: DEEPSEEK_MODEL_PRO
        value: deepseek-v4-pro
      - key: SESSION_SECRET
        generateValue: true
      - key: ALLOW_REGISTRATION
        value: true
      - key: AUTH_DATA_DIR
        value: /var/data/resume-assistant
    disk:
      name: resume-assistant-data
      mountPath: /var/data/resume-assistant
      sizeGB: 1
